<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="manifest.json" />
  <title>Daily Log</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --ok: #22c55e;
      --err: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    }
    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 0;
    }
    h1 { font-size: 1.5rem; margin: 0 0 4px; }
    .subtitle { color: var(--muted); margin: 0 0 24px; font-size: 0.9rem; }
    fieldset {
      border: none;
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      margin: 0 0 16px;
    }
    legend { font-weight: 600; padding: 0 6px; }
    label.option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 8px;
      border-radius: 8px;
      cursor: pointer;
    }
    label.option:hover { background: rgba(255,255,255,0.04); }
    input[type="radio"], input[type="checkbox"] {
      width: 20px; height: 20px; accent-color: var(--accent);
    }
    input[type="date"] {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0b1220;
      color: var(--text);
      font-size: 1rem;
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #0b1220;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: progress; }
    #status {
      margin-top: 16px;
      min-height: 1.5em;
      font-size: 0.95rem;
      text-align: center;
    }
    #status.ok  { color: var(--ok); }
    #status.err { color: var(--err); }
  </style>
</head>
<body>
  <main>
    <h1>Daily Log</h1>
    <p class="subtitle">Quick survey — saves to your Google Calendar.</p>

    <form id="log-form">
      <fieldset>
        <legend>Date</legend>
        <input type="date" id="date" name="date" required />
      </fieldset>

      <fieldset>
        <legend>Eating — carbs</legend>
        <label class="option"><input type="radio" name="carbs" value="high"   required /> High carbs</label>
        <label class="option"><input type="radio" name="carbs" value="medium" /> Medium carbs</label>
        <label class="option"><input type="radio" name="carbs" value="low"    /> Low carbs</label>
      </fieldset>

      <fieldset>
        <legend>Exercising — what did you do?</legend>
        <label class="option"><input type="checkbox" name="exercise" value="Animal Moves" /> Animal Moves</label>
        <label class="option"><input type="checkbox" name="exercise" value="Cardio" /> Cardio</label>
        <label class="option"><input type="checkbox" name="exercise" value="Resistance" /> Resistance</label>
      </fieldset>

      <fieldset>
        <legend>Sleeping</legend>
        <label class="option"><input type="checkbox" name="sleep" /> 7.5 hrs uninterrupted</label>
      </fieldset>

      <fieldset>
        <legend>Alcohol</legend>
        <label class="option"><input type="checkbox" name="alcohol" /> Consumed alcohol today</label>
      </fieldset>

      <button type="submit" id="submit-btn">Save to calendar</button>
      <div id="status" role="status" aria-live="polite"></div>
    </form>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
